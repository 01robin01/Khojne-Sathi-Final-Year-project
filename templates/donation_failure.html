<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Failure | Donation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #fafbfd;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --accent-green: #21c55e;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.05);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius-main: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius-main);
            box-shadow: var(--shadow-soft);
            width: 100%;
            max-width: 400px;
            padding: 4rem 3rem;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .geometric-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem auto;
            background-color: #fef2f2;
            color: #ef4444;
        }

        .geometric-icon svg {
            width: 40px;
            height: 40px;
        }

        .card-header {
            margin-bottom: 3rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .card-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid #e5e7eb;
        }

        .btn-outline:hover {
            background-color: #f9fafb;
            border-color: #d1d5db;
            transform: translateY(-2px);
        }

        footer {
            padding: 2rem;
            text-align: center;
            width: 100%;
        }

        .footer-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 1rem;
        }

        .footer-logo-link {
            display: inline-block;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .footer-logo-link:hover {
            transform: translateY(-2px);
        }

        .footer-esewa-logo {
            height: 24px;
            width: auto;
            opacity: 0.4;
            filter: grayscale(100%);
            transition: filter 0.3s ease, opacity 0.3s ease;
        }

        .footer-logo-link:hover .footer-esewa-logo {
            filter: grayscale(0%);
            opacity: 1;
        }
    </style>
</head>
<body>
    <main>
        <div class="card">
            <div class="geometric-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <div class="card-header">
                <h1 class="card-title">Payment Failed</h1>
                <p class="card-subtitle">We couldn't process your transaction.</p>
            </div>
            
            <a href="{% url 'donate' %}" class="btn btn-outline">Return</a>
        </div>
    </main>

    <footer>
        <h2 class="footer-title">Donation</h2>
        <a href="{% url 'donate' %}" class="footer-logo-link">
            <img src="https://esewa.com.np/common/images/esewa_logo.png" alt="Donate via eSewa" class="footer-esewa-logo">
        </a>
    </footer>
</body>
</html>
