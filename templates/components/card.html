<div class="col-md-3 d-flex">
        <div class="card w-100 h-100 d-flex flex-column">

          <div class="ratio ratio-4x3">
            <img src="{{ image_url }}" alt="{{ item_name }}" class="w-100 h-100 object-fit-contain rounded-top">
          </div>

          <div class="card-body text-center d-flex flex-column">
            <span class="badge {% if status == 'Found' %}bg-success{% else %}bg-danger{% endif %} mb-2">{{ status }}</span>
            <h6>{{ item_name }}</h6>
            <p class="text-muted small">{{ location }}</p>

            <div class="d-flex gap-2 mt-auto">
              <a class="btn btn-outline-primary btn-sm w-50" href="{{ view_url }}">View</a>
              <a class="btn btn-primary btn-sm w-50" href="{{ claim_url }}">Claim</a>
            </div>
          </div>

        </div>
    </div>
